<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>متجر الكورسات</title>

  <style>
    body {
      margin: 0;
      font-family: Tahoma, sans-serif;
      background: #ded0d0;
    }

    header {
      background: #d90fcc;
      color: #fff;
      padding: 20px;
      text-align: center;
    }

    .main {
      max-width: 1100px;
      margin: 20px auto;
      padding: 40px;
    }

    .courses-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 35px;
    }

    .course-card {
      background: #eaa6dc;
      padding: 20px;
      border-radius: 70px;
      text-align: center;
      box-shadow: 0 20px 6px rgba(0,0,0,0.2);
      transition: 0.2s;
    }

    .course-card:hover {
      transform: translateY(-4px);
    }

    .course-card img {
      width: 100%;
      border-radius: 6px;
    }

    footer {
      background: #222;
      color: #ffffff;
      text-align: center;
      padding: 10px;
      margin-top: 40px;
    }
  </style>

</head>
<body>

<header>
  <h1>متجر الكورسات التعليمية</h1>
</header>

<main class="main">

  <h2>الكورسات المتاحة</h2>

  <div class="courses-grid">

    <a href="c.2.html" class="course-card">
      <img src="aT.jpg" alt="">
      <h3>مقدمة في HTML و CSS</h3>
      <p>تعلم أساسيات بناء صفحات الويب.</p>
    </a>

    <a href="c.2.html" class="course-card">
      <img src="aG.jpg" alt="">
      <h3>التصميم المتجاوب</h3>
      <p>كيف تجعل موقعك يعمل على كل الأجهزة.</p>
    </a>

    <a href="c.2.html" class="course-card">
      <img src="AC.jpg" alt="">
      <h3>تخطيط صفحات الويب</h3>
      <p>تعلم Flexbox و Grid.</p>
    </a>
<a href="c.2.html">عرص تفاصيل الكورسات</a>

  </div>

</main>

<footer>
  جميع الحقوق محفوظة © 2026
</footer>

</body>
</html>
